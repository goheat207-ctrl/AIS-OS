<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    attributeBackgroundColorEven: dark ? '#2C2C2A' : '#F1EFE8',
    attributeBackgroundColorOdd: dark ? '#444441' : '#ffffff',
  },
});
const diagram = `erDiagram
  companies {
    int company_id PK
    text cik
    text ticker
    text company_name
    text exchange
    text sector
    text status
    text created_at
  }
  filings {
    int filing_id PK
    int company_id FK
    text accession_number
    text form_type
    text filing_date
    text filing_url
    text raw_file_path
    text parsed_text_path
    text source_status
    text created_at
  }
  filing_documents {
    int filing_document_id PK
    int filing_id FK
    text document_name
    text exhibit_type
    text document_url
    text raw_file_path
    int document_order
    text created_at
  }
  share_counts {
    int share_count_id PK
    int company_id FK
    int filing_id FK
    text as_of_date
    int shares_outstanding
    int authorized_shares
    int public_float_reported
    text source_note
    text confidence
    text created_at
  }
  offerings {
    int offering_id PK
    int company_id FK
    int filing_id FK
    text announced_date
    text offering_type
    real gross_proceeds
    real price_per_share
    int shares_offered
    text status
    text notes
    text created_at
  }
  atm_programs {
    int atm_id PK
    int company_id FK
    int filing_id FK
    text announced_date
    real total_capacity
    real used_capacity
    real remaining_capacity
    text sales_agent
    text status
    text notes
    text created_at
  }
  warrants {
    int warrant_id PK
    int company_id FK
    int filing_id FK
    text issue_date
    real exercise_price
    int share_count
    text expiry_date
    int cashless_allowed
    int reset_clause
    int blocker_clause
    text status
    text notes
    text created_at
  }
  convertibles {
    int convertible_id PK
    int company_id FK
    int filing_id FK
    text instrument_type
    real principal_amount
    real conversion_price
    text conversion_formula
    real floor_price
    text maturity_date
    int blocker_clause
    text status
    text notes
    text created_at
  }
  reverse_splits {
    int reverse_split_id PK
    int company_id FK
    int filing_id FK
    text effective_date
    text split_ratio
    text notes
    text created_at
  }
  notes {
    int note_id PK
    int company_id FK
    int related_filing_id FK
    text note_date
    text note_type
    text title
    text body
    text tags
    text confidence
    text created_at
  }
  analytics_snapshots {
    int snapshot_id PK
    int company_id FK
    text snapshot_date
    text dilution_risk
    real estimated_overhang
    real nearest_ceiling_price
    text summary
    text methodology_note
    text created_at
  }
  companies ||--o{ filings : has
  companies ||--o{ share_counts : tracks
  companies ||--o{ offerings : has
  companies ||--o{ atm_programs : has
  companies ||--o{ warrants : has
  companies ||--o{ convertibles : has
  companies ||--o{ reverse_splits : has
  companies ||--o{ notes : annotated_by
  companies ||--o{ analytics_snapshots : derives
  filings ||--o{ filing_documents : contains
  filings ||--o{ share_counts : sourced_from
  filings ||--o{ offerings : sourced_from
  filings ||--o{ atm_programs : sourced_from
  filings ||--o{ warrants : sourced_from
  filings ||--o{ convertibles : sourced_from
  filings ||--o{ reverse_splits : sourced_from
  filings ||--o{ notes : referenced_by
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
