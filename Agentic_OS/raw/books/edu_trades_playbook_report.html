<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reusable Research Report Template</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0d;
      --white: #ffffff;
      --offwhite: #f5f4f0;
      --gray: #6b7280;
      --light-gray: #e5e7eb;
      --green: #059669;
      --green-bg: #ecfdf5;
      --green-light: #a7f3d0;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-light: #fecaca;
      --amber: #b45309;
      --amber-bg: #fffbeb;
      --blue: #1e40af;
      --blue-bg: #eff6ff;
      --accent: #f59e0b;
      --accent-dark: #92400e;
      --divider: #e2e0db;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--offwhite);
      color: var(--black);
      font-size: 14px;
      line-height: 1.65;
    }

    .cover {
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 20%, rgba(245,158,11,.12) 0%, transparent 70%),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,.025) 80px);
    }

    .cover-num {
      position: absolute;
      top: 0;
      right: 0;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(200px, 30vw, 380px);
      color: rgba(255,255,255,.03);
      line-height: 1;
      letter-spacing: -.02em;
      pointer-events: none;
      user-select: none;
    }

    .cover-eyebrow {
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .cover h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(64px, 9vw, 120px);
      line-height: .92;
      letter-spacing: .01em;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .cover h1 span { color: var(--accent); }

    .cover-desc {
      font-size: 16px;
      color: rgba(255,255,255,.5);
      max-width: 520px;
      margin-bottom: 48px;
      line-height: 1.55;
      position: relative;
      z-index: 1;
    }

    .cover-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .cover-pill {
      border: 1px solid rgba(255,255,255,.15);
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
    }

    .cover-pill-gold { border-color: var(--accent); color: var(--accent); }

    .cover-stats {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 32px;
    }

    .c-stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .c-stat-l {
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }

    .c-stat-v {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: .02em;
    }

    .page {
      background: var(--white);
      max-width: 1200px;
      margin: 0 auto 2px;
      padding: 56px 60px;
      border-bottom: 1px solid var(--divider);
    }

    .page-label {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gray);
      border-top: 2px solid var(--black);
      padding-top: 6px;
      margin-bottom: 36px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 48px;
      letter-spacing: .02em;
      line-height: 1;
      margin-bottom: 20px;
    }

    h2 span { color: var(--accent); }

    h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -.01em;
    }

    h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 10px;
    }

    p { margin-bottom: 14px; color: #374151; }
    p:last-child { margin-bottom: 0; }
    ul { padding-left: 18px; }
    ul li { margin-bottom: 6px; color: #374151; }
    ol { padding-left: 20px; }
    ol li { margin-bottom: 8px; color: #374151; }
    strong { font-weight: 700; }

    .col-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .col-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }
    .divider { border: none; border-top: 1px solid var(--divider); margin: 36px 0; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mt-24 { margin-top: 24px; }
    .mt-28 { margin-top: 28px; }
    .mt-32 { margin-top: 32px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-20 { margin-bottom: 20px; }
    .mb-24 { margin-bottom: 24px; }

    .badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .badge-gold { background: var(--accent); color: var(--black); }
    .badge-green { background: var(--green); color: white; }
    .badge-red { background: var(--red); color: white; }
    .badge-black { background: var(--black); color: white; }
    .badge-blue { background: var(--blue); color: white; }
    .badge-outline { border: 1.5px solid var(--black); color: var(--black); background: transparent; }

    .conf-high,
    .conf-med,
    .conf-low {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      display: inline-block;
    }

    .conf-high {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-light);
    }

    .conf-med {
      background: var(--amber-bg);
      color: var(--amber);
      border: 1px solid #fde68a;
    }

    .conf-low {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-light);
    }

    .card {
      border: 1px solid var(--divider);
      border-radius: 8px;
      padding: 20px 24px;
      background: var(--white);
    }

    .card-gold { background: #fffbeb; border-color: #fde68a; }
    .card-green { background: var(--green-bg); border-color: var(--green-light); }
    .card-red { background: var(--red-bg); border-color: var(--red-light); }
    .card-blue { background: var(--blue-bg); border-color: #bfdbfe; }
    .card-black { background: var(--black); color: var(--white); }
    .card-black p, .card-black li { color: rgba(255,255,255,.72); }
    .card-black h3, .card-black h4 { color: var(--white); }

    .card-stripe { border-left: 4px solid var(--accent); }
    .card-stripe-green { border-left: 4px solid var(--green); }
    .card-stripe-red { border-left: 4px solid var(--red); }

    .setup-card {
      border: 1px solid var(--divider);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .setup-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      background: var(--black);
      color: var(--white);
      flex-wrap: wrap;
    }

    .setup-hdr-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      letter-spacing: .04em;
    }

    .setup-body { padding: 22px; }

    .setup-grid { display: grid; grid-template-columns: 1fr 1fr; }

    .setup-cell {
      padding: 14px 18px;
      border-right: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
    }

    .setup-cell:nth-child(2n) { border-right: none; }
    .setup-cell:nth-last-child(-n+2) { border-bottom: none; }

    .setup-cell-lbl {
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 5px;
    }

    .setup-cell-val { font-size: 13px; color: var(--black); }

    .pillar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

    .pillar-card {
      background: var(--black);
      color: var(--white);
      border-radius: 8px;
      padding: 16px 14px;
      text-align: center;
    }

    .pillar-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      color: var(--accent);
      line-height: 1;
    }

    .pillar-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-top: 8px;
    }

    .pillar-detail {
      font-size: 11px;
      color: rgba(255,255,255,.55);
      margin-top: 6px;
      line-height: 1.4;
    }

    .evidence-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--divider);
    }

    .evidence-row:last-child { border-bottom: none; }

    .evidence-num {
      min-width: 30px;
      height: 30px;
      background: var(--accent);
      color: var(--black);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .checklist { list-style: none; padding: 0; }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--divider);
      color: #374151;
    }

    .checklist li:last-child { border-bottom: none; }

    .c-icon { min-width: 20px; font-size: 15px; margin-top: 1px; }
    .c-green { color: var(--green); }
    .c-red { color: var(--red); }

    .t {
      width: 100%;
      border-collapse: collapse;
    }

    .t th {
      background: var(--black);
      color: white;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .t td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--divider);
      font-size: 13px;
      color: #374151;
      vertical-align: top;
    }

    .t tr:nth-child(even) td { background: #fafaf8; }

    .callout {
      border-left: 4px solid var(--black);
      padding: 14px 18px;
      background: #fafaf8;
      margin: 16px 0;
    }

    .callout-gold { border-left-color: var(--accent); background: var(--amber-bg); }
    .callout-green { border-left-color: var(--green); background: var(--green-bg); }
    .callout-red { border-left-color: var(--red); background: var(--red-bg); }

    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .pros-col { background: var(--green-bg); padding: 24px; border-radius: 8px 0 0 8px; }
    .cons-col { background: var(--red-bg); padding: 24px; border-radius: 0 8px 8px 0; }

    .rating-wrap {
      background: var(--light-gray);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin: 6px 0;
    }

    .rating-bar { height: 100%; border-radius: 4px; background: var(--green); }
    .rating-bar-gold { background: var(--accent); }

    .takeaway-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .takeaway-card {
      background: var(--black);
      color: white;
      border-radius: 8px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .takeaway-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 40px;
      color: var(--accent);
      line-height: 1;
    }

    .takeaway-text {
      font-size: 12px;
      color: rgba(255,255,255,.68);
      line-height: 1.5;
    }

    .unknown-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

    .unknown-card {
      background: var(--red-bg);
      border: 1px solid var(--red-light);
      border-radius: 8px;
      padding: 18px;
    }

    .unknown-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      color: var(--red);
      line-height: 1;
    }

    .unknown-text {
      font-size: 12px;
      color: #7f1d1d;
      line-height: 1.5;
      margin-top: 6px;
    }

    .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; align-items: center; }
    .vs-divider { display: flex; align-items: center; justify-content: center; width: 56px; }

    .vs-circle {
      width: 40px;
      height: 40px;
      background: var(--black);
      color: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      flex-shrink: 0;
    }

    .footer {
      background: var(--black);
      color: rgba(255,255,255,.3);
      text-align: center;
      padding: 24px;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    @media (max-width: 820px) {
      .page { padding: 36px 22px; }
      .col-2, .col-3, .setup-grid, .pros-cons, .takeaway-grid, .unknown-grid, .pillar-grid, .vs-grid {
        grid-template-columns: 1fr;
      }
      .cover { padding: 40px 28px; }
      .vs-divider { display: none; }
    }
  </style>
</head>
